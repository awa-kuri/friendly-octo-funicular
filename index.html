<meta name="theme-color" content="#0a0e27" />
<title>星座盤</title>

<link rel="apple-touch-icon" href="icon-192.png" />

<meta name="apple-mobile-web-app-title" content="星座盤" />

<style>
  /* ============ Reset / Base ============ */
  /* ============ Reset / Base ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  :root {
    --bg-deep: #0a0e27;
    --bg-mid: #101d3f;
    --bg-low: #0d1b2a;

    --text-main: #c8d6e5;
    --text-bright: #f0f4f8;
    --text-sub: #6b7fa3;
    --text-soft: #a8b8d0;

    --accent-deep: #2a4a7f;
    --accent-shadow: #1a3a6a;

    --moon: #d4e0ed;
  }

  body {
    background-color: var(--bg-low);
    color: var(--text-main);
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: 0.05em;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 60%, var(--bg-low) 100%);
  }

  #app {
    position: relative;
    width: 100%;
    height: 100%;
    height: 100dvh;
    padding: calc(env(safe-area-inset-top) + 1.5rem) 1rem calc(env(safe-area-inset-bottom) + 1rem);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ============ 背景：装飾用の星々 ============ */
  .bg-stars {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bg-stars .bg-star {
    position: absolute;
    border-radius: 50%;
    background: var(--moon);
    opacity: 0.3;
    animation: bg-twinkle ease-in-out infinite;
  }
  @keyframes bg-twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.7; }
  }

  /* ============ ヘッダー ============ */
  .header {
    position: relative;
    z-index: 2;
    width: 100%;
    text-align: center;
    margin-bottom: 0.8rem;
  }
  .title {
    font-size: 1.4rem;
    letter-spacing: 0.8em;
    text-indent: 0.8em;
    color: var(--text-bright);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }
  .info {
    font-family: 'Cormorant Garamond', 'Shippori Mincho', serif;
    font-size: 0.85rem;
    color: var(--text-sub);
    letter-spacing: 0.2em;
    line-height: 1.7;
    font-weight: 300;
  }
  .coords {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
  }

  /* ============ 星座盤本体（画面中央に固定） ============ */
  .main {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    pointer-events: none;
  }
  .disk-wrap {
    width: min(90vw, 380px);
    aspect-ratio: 1 / 1;
    pointer-events: auto;
  }
  .disk {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .dir-text {
    fill: var(--text-sub);
    font-size: 8px;
    font-family: 'Shippori Mincho', serif;
    letter-spacing: 0.1em;
  }
  .star-group { cursor: pointer; }

  /* ============ 一言メッセージ（枠なし、画面下方に浮かぶ） ============ */
  .remark-float {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom) + 8vh);
    transform: translateX(-50%);
    width: min(90vw, 380px);
    text-align: center;
    z-index: 5;
    animation: float-in 1.2s ease;
    pointer-events: none;
  }
  .remark {
    font-size: 0.95rem;
    color: var(--text-main);
    letter-spacing: 0.18em;
    line-height: 1.8;
    opacity: 0.85;
    text-shadow: 0 0 12px rgba(10, 14, 39, 0.8), 0 0 4px rgba(10, 14, 39, 0.9);
   white-space: pre-line;
  }
  .loc-note {
    margin-top: 0.6rem;
    font-size: 0.7rem;
    color: var(--text-sub);
    letter-spacing: 0.1em;
    opacity: 0.7;
    text-shadow: 0 0 8px rgba(10, 14, 39, 0.8);
   white-space: pre-line;
  }
  @keyframes float-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ============ 逸話オーバーレイ（半透明の和紙） ============ */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 4;
    cursor: pointer;
  }
  .tale-float {
    position: fixed;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%);
    width: min(86vw, 360px);
    z-index: 6;
    animation: tale-in 0.7s cubic-bezier(0.2, 0.7, 0.3, 1);
    cursor: pointer;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(212, 224, 237, 0.10) 0%, transparent 65%),
      linear-gradient(180deg, rgba(42, 74, 127, 0.32) 0%, rgba(26, 58, 106, 0.36) 50%, rgba(13, 27, 42, 0.40) 100%),
      rgba(10, 14, 39, 0.15);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 12%, black 88%, transparent 100%);
    mask-image: linear-gradient(180deg, transparent 0%, black 12%, black 88%, transparent 100%);
    -webkit-backdrop-filter: blur(6px) saturate(1.1);
    backdrop-filter: blur(6px) saturate(1.1);
    border: 1px solid rgba(212, 224, 237, 0.12);
    border-radius: 3px;
    box-shadow: 0 0 40px rgba(10, 14, 39, 0.4), inset 0 0 30px rgba(212, 224, 237, 0.04);
  }
  .tale-inner {
    padding: 2rem 1.6rem;
    color: #e8eef5;
  }
  .star-name {
    font-size: 1.05rem;
    color: var(--text-bright);
    letter-spacing: 0.2em;
    margin-bottom: 0.3rem;
    text-align: center;
    text-shadow: 0 0 12px rgba(10, 14, 39, 0.7);
  }
  .constellation {
    font-size: 0.8rem;
    color: var(--text-soft);
    letter-spacing: 0.25em;
    margin-bottom: 1rem;
    text-align: center;
    text-shadow: 0 0 8px rgba(10, 14, 39, 0.7);
  }
  .tale-text {
    font-size: 0.9rem;
    line-height: 2;
    letter-spacing: 0.08em;
    text-shadow: 0 0 10px rgba(10, 14, 39, 0.6);
  }
  @keyframes tale-in {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 6px)); }
    to { opacity: 1; transform: translate(-50%, -50%); }
  }
</style>
</head>
<body>

<!-- 背景の装飾星 -->

    '冬の星々は、刃のように鋭い。',
    'オリオンが、東から昇っている。',
    '冬の大三角──\nシリウス、プロキオン、ベテルギウス。',
  ],
  spring: [
    '北斗の柄を伸ばせばアルクトゥルスである。',
    '麦星が、東の空に高い。',
  ],
  autumn: [
    'ペガススの四辺形が、頭上にある。',
    '秋の夜は、星が少ない。\n……静かであるな。',
  ],
};

/* ============ 天文計算 ============ */
const RAD = Math.PI / 180;
const DEG = 180 / Math.PI;
const RADIUS = 160;

function julianDay(date) {
  const Y = date.getUTCFullYear();
  const M = date.getUTCMonth() + 1;
  const D = date.getUTCDate();
  const h = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  let y = Y, m = M;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + D + B - 1524.5 + h / 24;
}

function gmst(date) {
  const jd = julianDay(date);
  const T = (jd - 2451545.0) / 36525;
  let g = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
        + 0.000387933 * T * T - T * T * T / 38710000;
  g = ((g % 360) + 360) % 360;
  return g / 15;
}

function lst(date, lon) {
  return (gmst(date) + lon / 15 + 24) % 24;
}

function equatorialToHorizontal(ra, dec, lat, lst_h) {
  const ha = (lst_h - ra) * 15;
  const haR = ha * RAD;
  const decR = dec * RAD;
  const latR = lat * RAD;
  const sinAlt = Math.sin(decR) * Math.sin(latR) + Math.cos(decR) * Math.cos(latR) * Math.cos(haR);
  const alt = Math.asin(sinAlt) * DEG;
  const cosAz = (Math.sin(decR) - Math.sin(alt * RAD) * Math.sin(latR))
              / (Math.cos(alt * RAD) * Math.cos(latR));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * DEG;
  if (Math.sin(haR) > 0) az = 360 - az;
  return { alt, az };
}

function projectStar(alt, az) {
  if (alt < 0) return null;
  const r = (1 - alt / 90) * RADIUS;
  const theta = (az - 90) * RAD;
  return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
}

function starSize(mag) {
  const m = Math.max(-2, Math.min(4, mag));
  const r = 3.6 - m * 0.6;
  const opacity = Math.max(0.4, 1 - (m + 1.5) * 0.12);
  return { r: Math.max(0.6, r), opacity };
}

function getTimeBand(date) {
  const h = date.getHours();
  if (h >= 6 && h < 17) return 'day';
  if (h >= 17 && h < 19) return 'dusk';
  if (h >= 19 && h < 23) return 'night';
  if (h >= 23 || h < 3) return 'midnight';
  return 'dawn';
}

function getSeason(date) {
  const m = date.getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'autumn';
  return 'winter';
}

function pickRemark(date, seed) {
  const band = getTimeBand(date);
  const season = getSeason(date);
  const isNightBand = band === 'dusk' || band === 'night' || band === 'midnight';
  const pool = [
    ...REMARKS.general,
    ...REMARKS[band],
    ...(isNightBand ? REMARKS[season] : []),
  ];
  return pool[seed % pool.length];
}

/* ============ 状態 ============ */
const state = {
  now: new Date(),
  coords: { lat: 35.4437, lon: 139.6380, label: '横浜（既定）' },
  locStatus: 'idle', // idle | loading | granted | denied
  selected: null,
  remarkSeed: Math.floor(Math.random() * 1000),
};

/* ============ DOM参照 ============ */
const $ = (id) => document.getElementById(id);
const disk = $('disk');
const dateTimeEl = $('date-time');
const coordsEl = $('coords');
const overlayArea = $('overlay-area');

/* ============ 背景星の生成 ============ */
function generateBgStars() {
  const container = $('bg-stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('span');
    star.className = 'bg-star';
    star.style.left = `${(i * 137.5) % 100}%`;
    star.style.top = `${(i * 53.7) % 100}%`;
    star.style.animationDelay = `${(i * 0.7) % 6}s`;
    star.style.animationDuration = `${4 + (i % 5)}s`;
    const size = i % 7 === 0 ? '2px' : '1px';
    star.style.width = size;
    star.style.height = size;
    container.appendChild(star);
  }
}

/* ============ ヘッダー描画 ============ */
function renderHeader() {
  const d = state.now;
  const dateStr = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  dateTimeEl.textContent = `${dateStr}　${timeStr}`;
  coordsEl.textContent = `北緯${state.coords.lat.toFixed(2)}度　東経${state.coords.lon.toFixed(2)}度`;
}

/* ============ 星座盤描画 ============ */
function renderDisk() {
  const lst_h = lst(state.now, state.coords.lon);
  const projected = STARS.map((s) => {
    const { alt, az } = equatorialToHorizontal(s.ra, s.dec, state.coords.lat, lst_h);
    const p = projectStar(alt, az);
    return { ...s, alt, az, ...(p || {}), visible: p !== null };
  });
  const visibleStars = projected.filter((s) => s.visible);
  const starByName = {};
  visibleStars.forEach((s) => { starByName[s.name] = s; });

  const selectedCon = state.selected ? state.selected.con : null;

  // SVG構築
  const svgns = 'http://www.w3.org/2000/svg';
  // 既存内容をクリア
  while (disk.firstChild) disk.removeChild(disk.firstChild);

  // 背景の透明な円（何もない所のクリック判定）
  const bgCircle = document.createElementNS(svgns, 'circle');
  bgCircle.setAttribute('cx', 0);
  bgCircle.setAttribute('cy', 0);
  bgCircle.setAttribute('r', RADIUS + 20);
  bgCircle.setAttribute('fill', 'transparent');
  disk.appendChild(bgCircle);

  // 外周
  const outer = document.createElementNS(svgns, 'circle');
  outer.setAttribute('cx', 0); outer.setAttribute('cy', 0); outer.setAttribute('r', RADIUS);
  outer.setAttribute('fill', 'none');
  outer.setAttribute('stroke', 'rgba(212,224,237,0.18)');
  outer.setAttribute('stroke-width', '0.5');
  disk.appendChild(outer);

  // 高度線
  [RADIUS * 2 / 3, RADIUS / 3].forEach((r) => {
    const c = document.createElementNS(svgns, 'circle');
    c.setAttribute('cx', 0); c.setAttribute('cy', 0); c.setAttribute('r', r);
    c.setAttribute('fill', 'none');
    c.setAttribute('stroke', 'rgba(212,224,237,0.07)');
    c.setAttribute('stroke-width', '0.3');
    c.setAttribute('stroke-dasharray', '2 3');
    disk.appendChild(c);
  });

  // 方位記号
  const dirs = [
    { x: 0, y: -RADIUS - 6, t: '北', anchor: 'middle' },
    { x: RADIUS + 6, y: 3, t: '西', anchor: 'start' },
    { x: 0, y: RADIUS + 12, t: '南', anchor: 'middle' },
    { x: -RADIUS - 6, y: 3, t: '東', anchor: 'end' },
  ];
  dirs.forEach((d) => {
    const t = document.createElementNS(svgns, 'text');
    t.setAttribute('x', d.x); t.setAttribute('y', d.y);
    t.setAttribute('text-anchor', d.anchor);
    t.setAttribute('class', 'dir-text');
    t.textContent = d.t;
    disk.appendChild(t);
  });

  // 星座線
  LINES.forEach(([a, b]) => {
    const sa = starByName[a], sb = starByName[b];
    if (!sa || !sb) return;
    const highlight = selectedCon && (sa.con === selectedCon || sb.con === selectedCon);
    const line = document.createElementNS(svgns, 'line');
    line.setAttribute('x1', sa.x); line.setAttribute('y1', sa.y);
    line.setAttribute('x2', sb.x); line.setAttribute('y2', sb.y);
    line.setAttribute('stroke', highlight ? 'rgba(212,224,237,0.55)' : 'rgba(212,224,237,0.13)');
    line.setAttribute('stroke-width', highlight ? '0.8' : '0.4');
    disk.appendChild(line);
  });

  // 星
  visibleStars.forEach((s) => {
    const { r, opacity } = starSize(s.mag);
    const isHighlight = selectedCon && s.con === selectedCon;
    const isSelected = state.selected && state.selected.name === s.name;

    const g = document.createElementNS(svgns, 'g');
    g.setAttribute('class', 'star-group');
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      state.selected = s;
      renderDisk();
      renderOverlay();
    });

    // タップ判定用の透明円
    const hit = document.createElementNS(svgns, 'circle');
    hit.setAttribute('cx', s.x); hit.setAttribute('cy', s.y);
    hit.setAttribute('r', Math.max(8, r * 3));
    hit.setAttribute('fill', 'transparent');
    g.appendChild(hit);

    // 星本体
    const star = document.createElementNS(svgns, 'circle');
    star.setAttribute('cx', s.x); star.setAttribute('cy', s.y);
    star.setAttribute('r', isHighlight ? r * 1.3 : r);
    star.setAttribute('fill', '#f0f4f8');
    star.setAttribute('opacity', isHighlight ? Math.min(1, opacity + 0.3) : opacity);
    g.appendChild(star);

    // 一等星の光彩
    if (s.mag < 1.5) {
      const halo = document.createElementNS(svgns, 'circle');
      halo.setAttribute('cx', s.x); halo.setAttribute('cy', s.y);
      halo.setAttribute('r', r * 2.5);
      halo.setAttribute('fill', '#d4e0ed');
      halo.setAttribute('opacity', isHighlight ? '0.25' : '0.12');
      g.appendChild(halo);
    }

    // 選択中の脈動
    if (isSelected) {
      const ring = document.createElementNS(svgns, 'circle');
      ring.setAttribute('cx', s.x); ring.setAttribute('cy', s.y);
      ring.setAttribute('r', r * 3);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#f0f4f8');
      ring.setAttribute('stroke-width', '0.4');
      ring.setAttribute('opacity', '0.6');

      const animR = document.createElementNS(svgns, 'animate');
      animR.setAttribute('attributeName', 'r');
      animR.setAttribute('from', r * 2);
      animR.setAttribute('to', r * 5);
      animR.setAttribute('dur', '2s');
      animR.setAttribute('repeatCount', 'indefinite');
      ring.appendChild(animR);

      const animO = document.createElementNS(svgns, 'animate');
      animO.setAttribute('attributeName', 'opacity');
      animO.setAttribute('from', '0.6');
      animO.setAttribute('to', '0');
      animO.setAttribute('dur', '2s');
      animO.setAttribute('repeatCount', 'indefinite');
      ring.appendChild(animO);

      g.appendChild(ring);
    }

    disk.appendChild(g);
  });
}

/* ============ オーバーレイ描画 ============ */
function renderOverlay() {
  while (overlayArea.firstChild) overlayArea.removeChild(overlayArea.firstChild);

  if (state.selected) {
    // 透明な背景タップ層
    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.addEventListener('click', closeSelection);
    overlayArea.appendChild(backdrop);

    // 逸話パネル
    const tale = document.createElement('div');
    tale.className = 'tale-float';
    tale.addEventListener('click', (e) => {
      e.stopPropagation();
      closeSelection();
    });

    const inner = document.createElement('div');
    inner.className = 'tale-inner';

    const nameEl = document.createElement('div');
    nameEl.className = 'star-name';
    nameEl.textContent = state.selected.jname !== state.selected.name
      ? `${state.selected.name}　／　${state.selected.jname}`
      : state.selected.name;
    inner.appendChild(nameEl);

    const conEl = document.createElement('div');
    conEl.className = 'constellation';
    conEl.textContent = state.selected.con;
    inner.appendChild(conEl);

    const textEl = document.createElement('div');
    textEl.className = 'tale-text';
    textEl.textContent = TALES[state.selected.con] || '──この星にまつわる伝承は、まだ私の手元にない。';
    inner.appendChild(textEl);

    tale.appendChild(inner);
    overlayArea.appendChild(tale);
  } else {
    // 一言メッセージ
    const float = document.createElement('div');
    float.className = 'remark-float';

    const remarkEl = document.createElement('div');
    remarkEl.className = 'remark';
    remarkEl.textContent = pickRemark(state.now, state.remarkSeed);
    float.appendChild(remarkEl);

    if (state.locStatus === 'denied') {
      const note = document.createElement('div');
      note.className = 'loc-note';
      note.textContent = '※ 位置情報の取得が許されぬゆえ、横浜の空を映している';
      float.appendChild(note);
    }

    overlayArea.appendChild(float);
  }
}

function closeSelection() {
  if (!state.selected) return;
  state.selected = null;
  state.remarkSeed += 1;
  renderDisk();
  renderOverlay();
}

/* ============ 位置情報の取得 ============ */
function fetchLocation() {
  if (!navigator.geolocation) {
    state.locStatus = 'denied';
    renderOverlay();
    return;
  }
  state.locStatus = 'loading';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.coords = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        label: '現在地',
      };
      state.locStatus = 'granted';
      renderHeader();
      renderDisk();
      renderOverlay();
    },
    () => {
      state.locStatus = 'denied';
      renderOverlay();
    },
    { enableHighAccuracy: false, timeout: 6000, maximumAge: 600000 }
  );
}

/* ============ 時刻の更新 ============ */
function startClock() {
  setInterval(() => {
    state.now = new Date();
    renderHeader();
    renderDisk();
    // 時刻帯が変わる可能性があるので、選択していない時は一言も更新候補
    // ただし1分ごとに切り替わると煩いので、ここでは星位置のみ再計算
  }, 60 * 1000);
}

/* ============ 初期化 ============ */
function init() {
  generateBgStars();
  renderHeader();
  renderDisk();
  renderOverlay();
  fetchLocation();
  startClock();
}

/* Service Worker登録 */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {/* 黙殺 */});
  });
}

init();
</script>
</body>
